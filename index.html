<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Nos vemos en Roma para una pizza? 🍕💘</title>
  <style>
    :root {
      --text: #4a1f31;
      --pink: #ff4f98;
      --pink-dark: #e62b7d;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
      overflow-x: hidden;
    }

    .card {
      width: min(960px, 95vw);
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 26px;
      padding: 24px;
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 2;
      margin-top: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
    }

    .subtitle {
      margin: 0 0 18px;
      font-size: 15px;
      opacity: 0.78;
    }

    .hero {
      width: min(360px, 85vw);
      aspect-ratio: 1 / 1;
      margin: 0 auto 18px;
      border-radius: 20px;
      overflow: hidden;
      border: 4px solid rgba(255, 90, 150, 0.35);
      background: #fff;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .button-area {
      position: relative;
      width: min(520px, 100%);
      min-height: 150px;
      margin: 10px auto 8px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 22px;
      min-width: 140px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, filter 0.15s ease, left 0.2s ease, top 0.2s ease;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
      position: absolute;
    }

    #yesBtn {
      background: linear-gradient(180deg, var(--pink), var(--pink-dark));
      color: white;
      left: 110px;
      top: 30px;
      transform-origin: center;
      z-index: 3;
    }

    #noBtn {
      background: rgba(0, 0, 0, 0.08);
      color: var(--text);
      left: 280px;
      top: 30px;
      z-index: 3;
    }

    .message {
      min-height: 34px;
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 800;
      margin: 12px 0 10px;
    }

    .counter {
      font-size: 13px;
      opacity: 0.72;
      min-height: 18px;
      margin-bottom: 10px;
    }

    .gallery-wrap {
      width: min(960px, 95vw);
      position: relative;
      z-index: 2;
      margin-top: 24px;
      margin-bottom: 0;
    }

    .gallery {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .gallery.show {
      display: grid;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.85);
      animation: popIn 0.45s ease both;
    }

    .video-reveal {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 160vh;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.85) translateY(8px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .heart {
      position: fixed;
      bottom: -40px;
      font-size: 22px;
      animation: floatUp linear forwards;
      pointer-events: none;
      z-index: 3;
      opacity: 0.9;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) scale(1.6) rotate(20deg);
        opacity: 0;
      }
    }

    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.88);
      pointer-events: none;
      background: #111;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255, 180, 220, 0.03);
      z-index: 1;
      pointer-events: none;
    }

    @media (max-width: 720px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }

      .button-area {
        min-height: 180px;
      }

      #yesBtn {
        left: 45px;
        top: 35px;
      }

      #noBtn {
        left: 200px;
        top: 35px;
      }
    }

    @media (max-width: 480px) {
      .gallery {
        grid-template-columns: 1fr;
      }

      button {
        min-width: 120px;
        font-size: 16px;
        padding: 12px 18px;
      }

      .button-area {
        min-height: 210px;
      }

      #yesBtn {
        left: 20px;
        top: 35px;
      }

      #noBtn {
        left: 155px;
        top: 35px;
      }
    }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline preload="auto" id="bgVideo">
    <source src="video/background.mp4" type="video/mp4">
  </video>

  <main class="card">
    <h1>¿Nos vemos en Roma para una pizza? 🍕💘</h1>
    <p class="subtitle">Piénsalo muy bien antes de responder 😼</p>

    <div class="hero">
      <img id="mainImage" src="img/pizzaroma.jpg" alt="Pizza en Roma" />
    </div>

    <div class="button-area" id="buttonArea">
      <button id="yesBtn">Sí 💖</button>
      <button id="noBtn">No 🙄</button>
    </div>

    <div id="message" class="message"></div>
    <div id="counter" class="counter"></div>
  </main>

  <section id="galleryWrap" class="gallery-wrap">
    <section id="gallery" class="gallery">
      <img src="img/pizza.jpg" alt="Pizza en la playa" />
      <img src="img/bratz.jpg" alt="Bratz" />
      <img src="img/jetski.jpg" alt="Pareja en jetski" />
      <img src="img/zuma.jpg" alt="Postre de Zuma Roma" />
      <img src="img/madrid.jpg" alt="Madrid" />
      <img src="img/orosei.jpg" alt="Golfo di Orosei" />
    </section>
  </section>

  <section class="video-reveal"></section>

  <audio id="bgMusic" src="audio/mienteme.mp3" preload="auto"></audio>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");
    const counter = document.getElementById("counter");
    const mainImage = document.getElementById("mainImage");
    const gallery = document.getElementById("gallery");
    const buttonArea = document.getElementById("buttonArea");
    const bgMusic = document.getElementById("bgMusic");

    let noClicks = 0;
    const yesScales = [1.18, 1.42, 1.75, 2.15];

    function slowScrollTo(element, duration = 1800) {
      const target = element.getBoundingClientRect().top + window.pageYOffset;
      const start = window.pageYOffset;
      const distance = target - start;
      let startTime = null;

      function easeInOutQuad(t) {
        return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      }

      function animation(currentTime) {
        if (startTime === null) startTime = currentTime;
        const timeElapsed = currentTime - startTime;
        const progress = Math.min(timeElapsed / duration, 1);
        const easedProgress = easeInOutQuad(progress);

        window.scrollTo(0, start + distance * easedProgress);

        if (timeElapsed < duration) {
          requestAnimationFrame(animation);
        }
      }

      requestAnimationFrame(animation);
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.textContent = "💙";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (3 + Math.random() * 2.5) + "s";
      heart.style.fontSize = (18 + Math.random() * 24) + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 5500);
    }

    function burstHearts(total = 24) {
      for (let i = 0; i < total; i++) {
        setTimeout(createHeart, i * 120);
      }
    }

    function moveNoButton() {
      const areaRect = buttonArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxLeft = areaRect.width - btnRect.width;
      const maxTop = areaRect.height - btnRect.height;

      const newLeft = Math.max(0, Math.random() * maxLeft);
      const newTop = Math.max(0, Math.random() * maxTop);

      noBtn.style.left = `${newLeft}px`;
      noBtn.style.top = `${newTop}px`;
    }

    function resetGallery() {
      gallery.classList.remove("show");
    }

    function setMobileNoPosition() {
      if (window.innerWidth <= 480) {
        noBtn.style.left = "155px";
        noBtn.style.top = "35px";
      } else if (window.innerWidth <= 720) {
        noBtn.style.left = "200px";
        noBtn.style.top = "35px";
      } else {
        noBtn.style.left = "280px";
        noBtn.style.top = "30px";
      }
    }

    noBtn.addEventListener("click", () => {
      noClicks++;
      resetGallery();

      const scale = yesScales[Math.min(noClicks - 1, yesScales.length - 1)];
      yesBtn.style.transform = `scale(${scale})`;

      if (noClicks < 2) {
        message.textContent = "Mmm... piénsalo mejor 👀";
        counter.textContent = `No: ${noClicks}/2`;
        moveNoButton();
      } else {
        message.textContent = "Equivocada, hiciste llorar hasta a De Paul 😭";
        counter.textContent = "";
        mainImage.src = "img/depaul.jpg";
        noBtn.style.opacity = "0.45";
        noBtn.style.filter = "grayscale(.3)";
        noBtn.disabled = true;
      }
    });

    noBtn.addEventListener("mouseenter", () => {
      if (noClicks >= 1 && !noBtn.disabled) {
        moveNoButton();
      }
    });

    yesBtn.addEventListener("click", async () => {
      message.textContent = "Loquita, te espera un 2026 de ensueño ✨";
      counter.textContent = "";
      mainImage.src = "img/pizzaroma.jpg";
      gallery.classList.add("show");

      slowScrollTo(document.getElementById("galleryWrap"), 3000);
      burstHearts(5);

      noClicks = 0;
      yesBtn.style.transform = "scale(1)";
      noBtn.style.opacity = "1";
      noBtn.style.filter = "none";
      noBtn.disabled = false;
      setMobileNoPosition();

      try {
        await bgMusic.play();
      } catch (e) {
      }
    });

    window.addEventListener("resize", setMobileNoPosition);
    setMobileNoPosition();
  </script>
</body>
</html>
